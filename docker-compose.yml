version: "3.8"

# =============================================================================
# Qwen Image API — Docker Compose
#
# Quick start:
#   cp .env.example .env        # first time on a new machine
#   edit .env                   # set HF_CACHE_HOST_PATH for this machine
#   docker compose up -d
#
# Rebuild after code changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f qwen-image-api
#   tail -f ./logs/app.log
#
# Check GPU inside container:
#   docker compose exec qwen-image-api nvidia-smi
#
# Swagger UI:
#   http://localhost:8190/docs
# =============================================================================

services:
  qwen-image-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # sm_120 = RTX Pro 6000 (Blackwell).
        # To build for ONLY the target machine (faster build, smaller kernels):
        #   TORCH_CUDA_ARCH_LIST: "12.0"
        TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0;10.0;12.0"
        # Parallel compile jobs — increase if build machine has many cores.
        MAX_JOBS: "4"
        # Corporate proxy — required for apt-get, pip, git during build.
        http_proxy: "http://proxy.intra:80"
        https_proxy: "http://proxy.intra:80"
        no_proxy: "localhost,127.0.0.1"

    image: qwen-image-api:latest
    container_name: qwen-image-api

    ports:
      - "8190:8190"

    volumes:
      # ── HuggingFace model cache ───────────────────────────────────────────
      # Set HF_CACHE_HOST_PATH in .env to the cache directory on THIS machine.
      # Inside the container it always appears as /hf_cache.
      - ${HF_CACHE_HOST_PATH}:/hf_cache:rw

      # ── Persistent logs ───────────────────────────────────────────────────
      # app.log / access.log / uvicorn.log, rotated daily, kept 14 days.
      - ./logs:/app/logs

      # ── Optional: expose generated outputs to the host ───────────────────
      # - ./outputs:/app/outputs

    environment:
      # HuggingFace will look here first before downloading anything.
      # Container-side path is fixed; only the host-side path varies per machine.
      - HF_HOME=/hf_cache
      - TRANSFORMERS_CACHE=/hf_cache
      - HUGGINGFACE_HUB_CACHE=/hf_cache
      # Optional: set a Hugging Face token if the model repo is gated.
      # - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

    # Shared memory for PyTorch. 8 GB is a safe default for large diffusion models.
    shm_size: "8gb"

    restart: unless-stopped

    # Resource limits (optional — uncomment to enforce)
    # mem_limit: 64g
    # memswap_limit: 64g
