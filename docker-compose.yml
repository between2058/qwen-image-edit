version: "3.8"

# =============================================================================
# Qwen Image API — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# Rebuild after code changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f qwen-image-api
#
# Check GPU inside container:
#   docker compose exec qwen-image-api nvidia-smi
#
# Swagger UI:
#   http://localhost:8190/docs
# =============================================================================

services:
  qwen-image-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # sm_120 = RTX Pro 6000 (Blackwell).
        # To build for ONLY the target machine (faster build, smaller kernels):
        #   TORCH_CUDA_ARCH_LIST: "12.0"
        TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0;10.0;12.0"
        # Parallel compile jobs — increase if build machine has many cores.
        MAX_JOBS: "4"
        # Corporate proxy — required for apt-get, pip, git during build.
        http_proxy: "http://proxy.intra:80"
        https_proxy: "http://proxy.intra:80"
        no_proxy: "localhost,127.0.0.1"

    image: qwen-image-api:latest
    container_name: qwen-image-api

    ports:
      - "8190:8190"

    volumes:
      # ── Host storage mount ────────────────────────────────────────────────
      # /pegaai on the host maps to /notebooks inside the container (rw).
      # HuggingFace cache lives at /pegaai/model_team/huggingface_cache on
      # host → /notebooks/model_team/huggingface_cache in container.
      # Models already downloaded on the host are reused automatically;
      # new models are downloaded into the same host directory.
      - /pegaai:/notebooks:rw

      # ── Optional: expose generated outputs to the host ───────────────────
      # Uncomment to access result images directly on the host.
      # - ./outputs:/app/outputs

    environment:
      # HuggingFace will look here first before downloading anything.
      - HF_HOME=/notebooks/model_team/huggingface_cache
      - TRANSFORMERS_CACHE=/notebooks/model_team/huggingface_cache
      - HUGGINGFACE_HUB_CACHE=/notebooks/model_team/huggingface_cache
      # Optional: set a Hugging Face token if the model repo is gated.
      # - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Use "all" to expose every GPU, or pin to a specific device:
              #   device_ids: ["0"]
              count: 1
              capabilities: [gpu]

    # Shared memory for PyTorch. 8 GB is a safe default for large diffusion models.
    shm_size: "8gb"

    restart: unless-stopped

    # Resource limits (optional — uncomment to enforce)
    # mem_limit: 64g
    # memswap_limit: 64g

# No named volumes needed — model cache is on the host at /pegaai.
